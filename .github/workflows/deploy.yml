name: Deploy Nexus Solo to AWS

on:
  push:
    branches: [master]
  workflow_dispatch:  # Manual trigger from GitHub UI

env:
  AWS_REGION: ap-south-1
  STACK_NAME: nexus-solo
  ECS_CLUSTER: nexus-solo-cluster

permissions:
  id-token: write
  contents: read

jobs:
  # ─── Backend: Build → ECR → ECS ───────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: nexus-solo-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                       -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Force new ECS deployment
        run: |
          SVC_ARN=$(aws ecs list-services \
            --cluster $ECS_CLUSTER \
            --region $AWS_REGION \
            --query "serviceArns[0]" --output text)
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service "$SVC_ARN" \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for ECS service stability
        run: |
          SVC_ARN=$(aws ecs list-services \
            --cluster $ECS_CLUSTER \
            --region $AWS_REGION \
            --query "serviceArns[0]" --output text)
          echo "⏳ Waiting for service to stabilize..."
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services "$SVC_ARN" \
            --region $AWS_REGION
          echo "✅ Backend deployed and healthy!"

  # ─── Frontend: Build → S3 → CloudFront ────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Get CloudFront URL
        id: cf-url
        run: |
          CF_URL=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --region $AWS_REGION \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontURL'].OutputValue" \
            --output text)
          echo "url=$CF_URL" >> $GITHUB_OUTPUT

      - name: Build Next.js static site
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ steps.cf-url.outputs.url }}
          NEXT_PUBLIC_API_KEY: ${{ secrets.NEXT_PUBLIC_API_KEY }}
        run: |
          # Temporarily switch to static export for S3
          sed -i 's/output: "standalone"/output: "export"/' next.config.ts
          npm run build

      - name: Sync to S3
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --region $AWS_REGION \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          aws s3 sync frontend/out/ "s3://$BUCKET/" --delete --region $AWS_REGION

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[?Id=='S3Frontend']].Id" \
            --output text)
          if [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DIST_ID" \
              --paths "/*"
            echo "✅ CloudFront cache invalidated!"
          fi
